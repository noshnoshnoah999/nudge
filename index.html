<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#F8F6F2">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Nudge">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<title>Nudge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ===================== PALETTE & TOKENS ===================== */
:root{
  --bg:#D9C4A5;
  --bg-elevated:#E8DBC6;
  --card:#F0E7D6;
  --violet:#6E4A29;
  --violet-dark:#543718;
  --violet-soft:#E5D5BD;
  --violet-softer:#EDE2CF;
  --coral:#C0392B;
  --coral-dark:#9E2D21;
  --coral-soft:#EBD2C9;
  --coral-softer:#ECDAC6;
  --sage:#5E8C63;
  --sage-soft:#DCE4CD;
  --amber:#B07A2E;
  --text:#3B2A19;
  --text-2:#7E6240;
  --text-3:#A1885F;
  --border:#CDB99B;
  --border-2:#C0A988;
  --shadow-sm:0 1px 2px rgba(60,40,20,.05), 0 1px 3px rgba(60,40,20,.06);
  --shadow-md:0 4px 12px rgba(60,40,20,.08), 0 2px 4px rgba(60,40,20,.05);
  --shadow-lg:0 12px 40px rgba(60,40,20,.18), 0 4px 12px rgba(60,40,20,.10);
  --r-sm:10px;
  --r-md:14px;
  --r-lg:20px;
  --r-xl:28px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:var(--bg);
  color:var(--text);
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  overscroll-behavior-y:none;
  line-height:1.5;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
input,textarea,select{font-family:inherit;font-size:16px;color:var(--text);}
::selection{background:var(--violet-soft);}
.hidden{display:none !important;}

/* scrollbars */
::-webkit-scrollbar{width:10px;height:10px;}
::-webkit-scrollbar-thumb{background:var(--border-2);border-radius:10px;border:3px solid var(--bg);}
::-webkit-scrollbar-thumb:hover{background:var(--text-3);}

/* ===================== APP SHELL ===================== */
#app{display:flex;min-height:100vh;min-height:100dvh;}

/* Sidebar (desktop) */
#sidebar{
  width:264px;flex-shrink:0;
  background:var(--bg-elevated);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  padding:calc(20px + var(--safe-top)) 14px 20px;
  position:sticky;top:0;height:100vh;height:100dvh;
  overflow-y:auto;
}
.brand{display:flex;align-items:center;gap:10px;padding:6px 10px 22px;}
.brand-logo{
  width:34px;height:34px;border-radius:10px;
  background:linear-gradient(135deg,var(--violet),#8A6A45);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 12px rgba(91,79,207,.3);
}
.brand-logo svg{width:20px;height:20px;}
.brand-name{font-size:21px;font-weight:800;letter-spacing:-.02em;}
.nav-section-label{
  font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;
  color:var(--text-3);padding:14px 12px 7px;
}
.nav-item{
  display:flex;align-items:center;gap:11px;
  padding:9px 12px;border-radius:10px;
  font-size:14.5px;font-weight:500;color:var(--text-2);
  transition:background .12s,color .12s;width:100%;text-align:left;
}
.nav-item:hover{background:var(--bg);}
.nav-item.active{background:var(--violet-soft);color:var(--violet-dark);font-weight:600;}
.nav-item .ni-icon{width:20px;height:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.nav-item .ni-icon svg{width:18px;height:18px;}
.list-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0;}
.nav-item .ni-count{margin-left:auto;font-size:12.5px;font-weight:600;color:var(--text-3);background:var(--bg);padding:1px 8px;border-radius:20px;min-width:24px;text-align:center;}
.nav-item.active .ni-count{background:#fff;color:var(--violet);}
.nav-overdue-badge{margin-left:auto;font-size:12px;font-weight:700;color:#fff;background:var(--coral);padding:1px 8px;border-radius:20px;}
.add-list-btn{margin-top:6px;color:var(--text-3);font-size:13.5px;}
.add-list-btn:hover{color:var(--violet);}
.sidebar-spacer{flex:1;}

/* ===================== MAIN ===================== */
#main{flex:1;min-width:0;display:flex;flex-direction:column;}
#main-scroll{flex:1;overflow-y:auto;}
.main-inner{max-width:720px;margin:0 auto;padding:calc(26px + var(--safe-top)) 24px 140px;}

/* Topbar */
.topbar{display:flex;align-items:center;gap:14px;margin-bottom:8px;}
.view-title{font-size:30px;font-weight:800;letter-spacing:-.025em;flex:1;display:flex;align-items:center;gap:12px;}
.view-title .vt-dot{width:16px;height:16px;border-radius:50%;}
.view-sub{font-size:14.5px;color:var(--text-2);margin-bottom:24px;font-weight:450;}
.icon-btn{
  width:42px;height:42px;border-radius:12px;background:var(--bg-elevated);
  border:1px solid var(--border);display:flex;align-items:center;justify-content:center;
  color:var(--text-2);transition:.14s;flex-shrink:0;box-shadow:var(--shadow-sm);
}
.icon-btn:hover{color:var(--violet);border-color:var(--violet-soft);transform:translateY(-1px);}
.icon-btn svg{width:20px;height:20px;}
.icon-btn.active{background:var(--violet);color:#fff;border-color:transparent;}
/* board / kanban */
.board{display:flex;gap:14px;overflow-x:auto;padding-bottom:14px;align-items:flex-start;-webkit-overflow-scrolling:touch;}
.board-col{flex:0 0 262px;max-width:262px;background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--r-md);padding:10px;box-shadow:var(--shadow-sm);}
.board-col-head{display:flex;align-items:center;gap:8px;font-weight:700;font-size:14px;padding:5px 6px 11px;letter-spacing:-.01em;}
.board-col-count{margin-left:auto;font-size:12px;font-weight:600;color:var(--text-3);background:var(--bg);padding:0 8px;border-radius:20px;}
.board-col-body{display:flex;flex-direction:column;gap:8px;min-height:50px;border-radius:10px;padding:2px;transition:background .12s;}
.board-col-body.drop{background:var(--violet-soft);outline:2px dashed var(--violet);}
.board-card{display:flex;gap:9px;align-items:flex-start;background:var(--card);border:1px solid var(--border);border-radius:11px;padding:10px 11px;cursor:grab;box-shadow:var(--shadow-sm);transition:box-shadow .12s;}
.board-card:hover{box-shadow:var(--shadow-md);}
.board-card:active{cursor:grabbing;}
.board-card.overdue{border-left:3px solid var(--coral);background:var(--coral-softer);}
.board-card.dragging{opacity:.4;}
.board-card .check{width:20px;height:20px;margin-top:1px;}
.board-card-body{flex:1;min-width:0;}
.board-card-title{font-size:13.5px;font-weight:500;line-height:1.38;word-break:break-word;}
.board-card-due{font-size:11.5px;color:var(--text-3);margin-top:3px;}
.board-card-due.od{color:var(--coral);font-weight:600;}
.board-empty{text-align:center;color:var(--text-3);font-size:12px;padding:14px 6px;border:1.5px dashed var(--border);border-radius:9px;}

/* Search */
.search-wrap{position:relative;margin-bottom:22px;}
.search-wrap svg{position:absolute;left:15px;top:50%;transform:translateY(-50%);width:19px;height:19px;color:var(--text-3);pointer-events:none;}
#searchInput{
  width:100%;padding:13px 16px 13px 44px;border-radius:14px;
  background:var(--bg-elevated);border:1px solid var(--border);
  font-size:15px;box-shadow:var(--shadow-sm);transition:.14s;
}
#searchInput:focus{outline:none;border-color:var(--violet);box-shadow:0 0 0 3px var(--violet-soft);}
.search-clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);width:26px;height:26px;border-radius:50%;background:var(--border);display:none;align-items:center;justify-content:center;color:var(--text-2);}
.search-clear svg{width:14px;height:14px;}

/* Triage banner */
.triage-banner{
  display:flex;align-items:center;gap:15px;
  background:linear-gradient(120deg,var(--coral),#CF5A45);
  color:#fff;padding:16px 18px;border-radius:var(--r-md);margin-bottom:24px;
  box-shadow:0 8px 24px rgba(232,93,74,.3);cursor:pointer;transition:.16s;
  position:relative;overflow:hidden;
}
.triage-banner:hover{transform:translateY(-2px);box-shadow:0 12px 30px rgba(232,93,74,.38);}
.triage-banner::after{content:'';position:absolute;right:-30px;top:-30px;width:120px;height:120px;background:rgba(255,255,255,.08);border-radius:50%;}
.tb-icon{width:42px;height:42px;border-radius:11px;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.tb-icon svg{width:23px;height:23px;}
.tb-text{flex:1;min-width:0;}
.tb-title{font-weight:700;font-size:16px;letter-spacing:-.01em;}
.tb-sub{font-size:13px;opacity:.92;margin-top:1px;}
.tb-arrow{width:30px;height:30px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.tb-arrow svg{width:22px;height:22px;}

/* ===================== SECTIONS ===================== */
.section{margin-bottom:30px;}
.section-head{display:flex;align-items:center;gap:9px;margin-bottom:13px;padding-left:2px;}
.section-title{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-3);}
.section.overdue .section-title{color:var(--coral);}
.section-count{font-size:12px;font-weight:700;color:var(--text-3);background:var(--bg-elevated);border:1px solid var(--border);padding:0 8px;border-radius:20px;line-height:19px;}
.section.overdue .section-count{color:#fff;background:var(--coral);border-color:var(--coral);}
.section-line{flex:1;height:1px;background:var(--border);}

/* Reminder card */
.rcard{
  display:flex;align-items:flex-start;gap:13px;
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--r-md);padding:14px 15px;margin-bottom:9px;
  box-shadow:var(--shadow-sm);transition:transform .14s,box-shadow .14s,border-color .14s;
  position:relative;cursor:pointer;
}
.rcard:hover{box-shadow:var(--shadow-md);transform:translateY(-1px);}
.rcard.overdue{border-left:3px solid var(--coral);background:var(--coral-softer);}
.rcard.done{opacity:.55;}
.rcard.swiping{transition:none;}
.check{
  width:23px;height:23px;border-radius:50%;border:2px solid var(--border-2);
  flex-shrink:0;margin-top:1px;transition:.15s;display:flex;align-items:center;justify-content:center;
  background:#fff;
}
.check svg{width:13px;height:13px;color:#fff;opacity:0;transform:scale(.5);transition:.15s;}
.check:hover{border-color:var(--violet);}
.rcard.p-high .check{border-color:var(--coral);}
.rcard.done .check{background:var(--sage);border-color:var(--sage);}
.rcard.done .check svg{opacity:1;transform:scale(1);}
.rcard.overdue .check:hover{border-color:var(--coral);}
.rbody{flex:1;min-width:0;}
.rtitle{font-size:15px;font-weight:550;line-height:1.4;word-break:break-word;}
.rcard.done .rtitle{text-decoration:line-through;text-decoration-color:var(--sage);color:var(--text-2);}
.rmeta{display:flex;align-items:center;gap:10px;margin-top:6px;flex-wrap:wrap;}
.rmeta-item{display:flex;align-items:center;gap:5px;font-size:12.5px;color:var(--text-3);font-weight:500;}
.rmeta-item svg{width:13px;height:13px;}
.rmeta-item.due-overdue{color:var(--coral);font-weight:650;}
.rmeta-item.due-today{color:var(--violet);font-weight:600;}
.rlist-tag{display:flex;align-items:center;gap:5px;font-size:12.5px;font-weight:550;}
.rlist-tag .list-dot{width:8px;height:8px;}
.rnote-preview{font-size:13px;color:var(--text-3);margin-top:4px;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden;}
.pri-flag{display:inline-flex;align-items:center;gap:4px;font-size:11.5px;font-weight:700;padding:1px 7px;border-radius:6px;}
.pri-flag.high{background:var(--coral-soft);color:var(--coral-dark);}
.pri-flag.low{background:var(--bg);color:var(--text-3);}
.auto-badge{font-size:10.5px;font-weight:700;padding:1px 6px;border-radius:5px;background:var(--violet-soft);color:var(--violet);text-transform:uppercase;letter-spacing:.03em;}
.tag-chip{display:inline-flex;align-items:center;font-size:12px;font-weight:650;color:var(--violet);background:var(--violet-soft);padding:1px 8px;border-radius:6px;transition:.12s;}
.tag-chip:hover{background:var(--violet);color:#fff;}
.rcard-actions{display:flex;gap:2px;align-items:center;opacity:0;transition:.14s;margin-left:4px;}
.rcard:hover .rcard-actions{opacity:1;}
.rmini-btn{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--text-3);transition:.12s;}
.rmini-btn:hover{background:var(--bg);color:var(--coral);}
.rmini-btn svg{width:16px;height:16px;}

/* swipe reveal (mobile) */
.rcard-wrap{position:relative;overflow:hidden;border-radius:var(--r-md);margin-bottom:9px;}
.rcard-wrap .rcard{margin-bottom:0;}
.swipe-bg{position:absolute;inset:0;display:flex;align-items:center;justify-content:flex-end;padding-right:22px;background:linear-gradient(90deg,#CF5A45,var(--coral));color:#fff;border-radius:var(--r-md);}
.swipe-bg svg{width:22px;height:22px;}

/* empty states */
.empty{text-align:center;padding:70px 20px;}
.empty-emoji{font-size:54px;margin-bottom:18px;filter:saturate(.9);}
.empty-title{font-size:19px;font-weight:700;margin-bottom:7px;letter-spacing:-.01em;}
.empty-text{font-size:14.5px;color:var(--text-2);max-width:300px;margin:0 auto;line-height:1.55;}
.all-clear{text-align:center;padding:48px 20px;}
.all-clear .ac-circle{width:78px;height:78px;border-radius:50%;background:var(--sage-soft);display:flex;align-items:center;justify-content:center;margin:0 auto 18px;}
.all-clear .ac-circle svg{width:38px;height:38px;color:var(--sage);}

/* ===================== FAB ===================== */
.fab{
  position:fixed;right:28px;bottom:calc(28px + var(--safe-bottom));z-index:40;
  width:60px;height:60px;border-radius:20px;
  background:linear-gradient(135deg,var(--violet),#8A6A45);
  display:flex;align-items:center;justify-content:center;color:#fff;
  box-shadow:0 10px 30px rgba(91,79,207,.42);transition:.18s;
}
.fab:hover{transform:translateY(-3px) scale(1.04);box-shadow:0 16px 40px rgba(91,79,207,.5);}
.fab:active{transform:scale(.95);}
.fab svg{width:28px;height:28px;}

/* ===================== BOTTOM NAV (mobile) ===================== */
#bottomnav{
  display:none;position:fixed;bottom:0;left:0;right:0;z-index:35;
  background:rgba(255,255,255,.86);backdrop-filter:saturate(180%) blur(20px);
  -webkit-backdrop-filter:saturate(180%) blur(20px);
  border-top:1px solid var(--border);
  padding:8px 8px calc(8px + var(--safe-bottom));
  justify-content:space-around;
}
.bn-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px 18px;color:var(--text-3);transition:.12s;border-radius:12px;position:relative;}
.bn-item.active{color:var(--violet);}
.bn-item svg{width:24px;height:24px;}
.bn-label{font-size:10.5px;font-weight:600;}
.bn-badge{position:absolute;top:0;right:11px;min-width:17px;height:17px;background:var(--coral);color:#fff;font-size:10px;font-weight:700;border-radius:10px;display:flex;align-items:center;justify-content:center;padding:0 4px;border:2px solid #fff;}

/* ===================== MODALS / SHEETS ===================== */
.overlay{
  position:fixed;inset:0;z-index:50;background:rgba(30,28,40,.4);
  backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);
  display:flex;align-items:flex-end;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .22s;
}
.overlay.show{opacity:1;pointer-events:auto;}
.sheet{
  background:var(--bg-elevated);width:100%;max-width:540px;
  border-radius:var(--r-xl) var(--r-xl) 0 0;
  padding:10px 22px calc(24px + var(--safe-bottom));
  box-shadow:var(--shadow-lg);transform:translateY(100%);transition:transform .28s cubic-bezier(.32,.72,0,1);
  max-height:92vh;overflow-y:auto;
}
.overlay.show .sheet{transform:translateY(0);}
@media(min-width:600px){
  .overlay{align-items:center;}
  .sheet{border-radius:var(--r-xl);max-height:88vh;}
}
.sheet-handle{width:38px;height:4px;border-radius:4px;background:var(--border-2);margin:6px auto 16px;}
.sheet-title{font-size:20px;font-weight:750;letter-spacing:-.02em;margin-bottom:4px;}

/* Quick add */
#qaTitle{
  width:100%;font-size:19px;font-weight:550;padding:8px 2px;border:none;
  background:none;letter-spacing:-.01em;
}
#qaTitle:focus{outline:none;}
#qaTitle::placeholder{color:var(--text-3);font-weight:450;}
.qa-divider{height:1px;background:var(--border);margin:10px 0 14px;}
.qa-chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:4px;}
.qa-chip{
  display:flex;align-items:center;gap:6px;padding:8px 13px;border-radius:11px;
  background:var(--bg);border:1px solid var(--border);font-size:13.5px;font-weight:550;color:var(--text-2);
  transition:.12s;
}
.qa-chip:hover{border-color:var(--violet-soft);color:var(--violet);}
.qa-chip.set{background:var(--violet-soft);border-color:transparent;color:var(--violet-dark);}
.qa-chip svg{width:16px;height:16px;}
.qa-chip .chip-x{margin-left:2px;opacity:.6;}
.qa-chip .chip-x:hover{opacity:1;}

/* expandable detail rows */
.qa-detail{margin-top:14px;display:none;flex-direction:column;gap:2px;}
.qa-detail.show{display:flex;}
.field-row{display:flex;align-items:center;gap:12px;padding:13px 2px;border-bottom:1px solid var(--border);}
.field-row:last-child{border-bottom:none;}
.field-icon{width:22px;height:22px;color:var(--text-3);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.field-icon svg{width:19px;height:19px;}
.field-label{font-size:14.5px;font-weight:500;flex-shrink:0;width:74px;color:var(--text-2);}
.field-control{flex:1;display:flex;justify-content:flex-end;gap:8px;align-items:center;flex-wrap:wrap;}
.field-row input[type=date],.field-row input[type=time]{
  border:1px solid var(--border);border-radius:9px;padding:7px 11px;font-size:14px;background:var(--bg);
}
.field-row input:focus{outline:none;border-color:var(--violet);}
.qa-select{border:1px solid var(--border);border-radius:9px;padding:7px 11px;font-size:14px;background:var(--bg);color:var(--text);font-family:inherit;cursor:pointer;}
.qa-select:focus{outline:none;border-color:var(--violet);}
#qaNotes{
  width:100%;border:1px solid var(--border);border-radius:11px;padding:11px 13px;
  font-size:14.5px;resize:vertical;min-height:60px;background:var(--bg);margin-top:2px;
}
#qaNotes:focus{outline:none;border-color:var(--violet);background:#fff;}
.seg{display:inline-flex;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:3px;gap:2px;}
.seg button{padding:6px 13px;border-radius:8px;font-size:13px;font-weight:600;color:var(--text-2);transition:.12s;}
.seg button.on{background:#fff;color:var(--violet);box-shadow:var(--shadow-sm);}
.seg button.on[data-pri=high]{color:var(--coral-dark);}
.list-select-pills{display:flex;gap:7px;flex-wrap:wrap;justify-content:flex-end;}
.lpill{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:20px;border:1.5px solid var(--border);font-size:13px;font-weight:600;color:var(--text-2);transition:.12s;}
.lpill.on{border-color:currentColor;}
.lpill .list-dot{width:9px;height:9px;}

.sub-row{display:flex;align-items:center;gap:10px;padding:6px 0;}
.sub-check{width:20px;height:20px;border-radius:6px;border:2px solid var(--border-2);flex-shrink:0;display:flex;align-items:center;justify-content:center;background:#fff;transition:.12s;}
.sub-check svg{width:11px;height:11px;color:#fff;opacity:0;}
.sub-check.done{background:var(--sage);border-color:var(--sage);}
.sub-check.done svg{opacity:1;}
.sub-text{flex:1;font-size:14px;word-break:break-word;}
.sub-row.done .sub-text{text-decoration:line-through;color:var(--text-3);}
.sub-del{width:24px;height:24px;border-radius:6px;color:var(--text-3);display:flex;align-items:center;justify-content:center;flex-shrink:0;background:none;}
.sub-del:hover{background:var(--coral-soft);color:var(--coral-dark);}
.sub-del svg{width:13px;height:13px;}
.sheet-actions{display:flex;gap:10px;margin-top:22px;}
.btn{flex:1;padding:14px;border-radius:14px;font-size:15.5px;font-weight:650;transition:.14s;text-align:center;}
.btn-primary{background:var(--violet);color:#fff;box-shadow:0 6px 18px rgba(91,79,207,.32);}
.btn-primary:hover{background:var(--violet-dark);transform:translateY(-1px);}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none;}
.btn-ghost{background:var(--bg);color:var(--text-2);flex:0 0 auto;padding:14px 22px;}
.btn-ghost:hover{background:var(--border);}
.btn-danger{background:var(--coral-soft);color:var(--coral-dark);}
.btn-danger:hover{background:var(--coral);color:#fff;}

/* expand toggle */
.qa-more{display:flex;align-items:center;gap:6px;color:var(--violet);font-size:13.5px;font-weight:600;padding:12px 2px 2px;}
.qa-more svg{width:16px;height:16px;transition:transform .2s;}
.qa-more.open svg{transform:rotate(180deg);}

/* ===================== TRIAGE FULLSCREEN ===================== */
#triage{
  position:fixed;inset:0;z-index:60;background:var(--bg);
  display:none;flex-direction:column;
  padding:calc(18px + var(--safe-top)) 20px calc(20px + var(--safe-bottom));
}
#triage.show{display:flex;}
.triage-top{display:flex;align-items:center;gap:14px;margin-bottom:8px;}
.triage-close{width:40px;height:40px;border-radius:11px;background:var(--bg-elevated);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--text-2);}
.triage-close svg{width:20px;height:20px;}
.triage-progress-wrap{flex:1;}
.triage-stage-label{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-3);margin-bottom:6px;}
.triage-bar{height:6px;background:var(--border);border-radius:6px;overflow:hidden;}
.triage-bar-fill{height:100%;background:linear-gradient(90deg,var(--violet),#8A6A45);border-radius:6px;transition:width .3s;width:0;}
.triage-stage-num{font-size:13px;font-weight:700;color:var(--text-3);}

.triage-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;max-width:540px;margin:0 auto;width:100%;}

/* stage intro */
.stage-intro{text-align:center;}
.stage-intro .si-emoji{font-size:60px;margin-bottom:20px;}
.stage-intro h2{font-size:26px;font-weight:800;letter-spacing:-.02em;margin-bottom:10px;}
.stage-intro p{font-size:15.5px;color:var(--text-2);max-width:360px;margin:0 auto 28px;line-height:1.55;}
.stage-stat{display:inline-flex;align-items:baseline;gap:8px;background:var(--coral-soft);color:var(--coral-dark);padding:8px 18px;border-radius:30px;font-weight:600;font-size:15px;margin-bottom:28px;}
.stage-stat b{font-size:22px;font-weight:800;}

/* stage 1 relevance card */
.relev-card{
  background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);
  padding:30px 26px;width:100%;box-shadow:var(--shadow-md);text-align:center;
  animation:cardIn .3s cubic-bezier(.32,.72,0,1);
}
@keyframes cardIn{from{opacity:0;transform:scale(.94) translateY(10px);}to{opacity:1;transform:scale(1) translateY(0);}}
.relev-card .rc-age{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:700;color:var(--coral);background:var(--coral-soft);padding:5px 13px;border-radius:20px;margin-bottom:18px;text-transform:uppercase;letter-spacing:.03em;}
.relev-card .rc-title{font-size:22px;font-weight:700;line-height:1.35;letter-spacing:-.01em;margin-bottom:8px;word-break:break-word;}
.relev-card .rc-list{display:inline-flex;align-items:center;gap:6px;font-size:13.5px;color:var(--text-2);font-weight:550;}
.relev-card .rc-list .list-dot{width:9px;height:9px;}
.relev-card .rc-note{font-size:14px;color:var(--text-3);margin-top:12px;line-height:1.5;}

.triage-actions{display:flex;gap:12px;width:100%;margin-top:24px;}
.ta-btn{flex:1;padding:18px;border-radius:var(--r-md);font-size:16px;font-weight:700;display:flex;flex-direction:column;align-items:center;gap:7px;transition:.14s;border:2px solid transparent;}
.ta-btn svg{width:26px;height:26px;}
.ta-btn:hover{transform:translateY(-2px);}
.ta-yes{background:var(--sage-soft);color:#4E7B54;}
.ta-yes:hover{background:var(--sage);color:#fff;}
.ta-no{background:var(--bg-elevated);color:var(--text-2);border-color:var(--border);}
.ta-no:hover{background:var(--coral-soft);color:var(--coral-dark);border-color:transparent;}

/* spotlight stage (stage 3) */
.spot-actions{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;width:100%;margin-top:24px;}
.spot-btn{padding:16px 8px;border-radius:var(--r-md);font-size:14px;font-weight:700;display:flex;flex-direction:column;align-items:center;gap:8px;transition:.14s;border:2px solid transparent;}
.spot-btn svg{width:24px;height:24px;}
.spot-btn:hover{transform:translateY(-2px);}
.spot-done{background:var(--sage-soft);color:#4E7B54;}
.spot-done:hover{background:var(--sage);color:#fff;}
.spot-snooze{background:var(--violet-soft);color:var(--violet-dark);}
.spot-snooze:hover{background:var(--violet);color:#fff;}
.spot-del{background:var(--bg-elevated);color:var(--text-2);border-color:var(--border);}
.spot-del:hover{background:var(--coral-soft);color:var(--coral-dark);border-color:transparent;}

/* reschedule quick options */
.resched-pop{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:18px;width:100%;animation:cardIn .2s;}
.resched-opt{padding:11px 16px;border-radius:12px;background:var(--bg-elevated);border:1px solid var(--border);font-size:14px;font-weight:600;color:var(--text);transition:.12s;}
.resched-opt:hover{background:var(--violet);color:#fff;border-color:transparent;}

/* batch dismiss (stage 2) */
.batch-list{width:100%;max-height:46vh;overflow-y:auto;margin-bottom:8px;border:1px solid var(--border);border-radius:var(--r-md);background:var(--card);}
.batch-row{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid var(--border);}
.batch-row:last-child{border-bottom:none;}
.batch-check{width:22px;height:22px;border-radius:6px;border:2px solid var(--border-2);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:.12s;}
.batch-check svg{width:13px;height:13px;color:#fff;opacity:0;}
.batch-row.sel .batch-check{background:var(--coral);border-color:var(--coral);}
.batch-row.sel .batch-check svg{opacity:1;}
.batch-info{flex:1;min-width:0;}
.batch-title{font-size:14.5px;font-weight:550;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.batch-age{font-size:12px;color:var(--coral);font-weight:600;margin-top:1px;}
.triage-stage-done{text-align:center;}

.triage-foot{display:flex;gap:12px;width:100%;max-width:540px;margin:18px auto 0;}

/* toast */
#toast{
  position:fixed;bottom:calc(96px + var(--safe-bottom));left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--text);color:#fff;padding:13px 20px;border-radius:14px;font-size:14.5px;font-weight:550;
  box-shadow:var(--shadow-lg);z-index:70;opacity:0;pointer-events:none;transition:.26s;display:flex;align-items:center;gap:12px;
  max-width:90vw;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
#toast .toast-action{color:#9D92FF;font-weight:700;padding-left:6px;border-left:1px solid rgba(255,255,255,.2);margin-left:4px;}
#toast .toast-icon{width:20px;height:20px;flex-shrink:0;}
#toast .toast-icon svg{width:20px;height:20px;}

/* sync status pill */
.sync-pill{display:flex;align-items:center;gap:7px;padding:7px 12px;border-radius:20px;font-size:12px;font-weight:600;color:var(--text-3);background:var(--bg);margin:0 6px;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--text-3);}
.sync-pill.local .sync-dot{background:var(--amber);}
.sync-pill.synced .sync-dot{background:var(--sage);}
.sync-pill.syncing .sync-dot{background:var(--violet);animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}

/* settings rows */
.set-group{background:var(--card);border:1px solid var(--border);border-radius:var(--r-md);overflow:hidden;margin-bottom:18px;box-shadow:var(--shadow-sm);}
.set-row{display:flex;align-items:center;gap:13px;padding:15px 17px;border-bottom:1px solid var(--border);}
.set-row:last-child{border-bottom:none;}
.set-row .sr-icon{width:34px;height:34px;border-radius:9px;background:var(--violet-soft);color:var(--violet);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.set-row .sr-icon svg{width:19px;height:19px;}
.sr-text{flex:1;min-width:0;}
.sr-title{font-size:15px;font-weight:600;}
.sr-sub{font-size:12.5px;color:var(--text-3);margin-top:1px;}
.toggle{width:50px;height:30px;border-radius:30px;background:var(--border-2);position:relative;transition:.2s;flex-shrink:0;}
.toggle.on{background:var(--violet);}
.toggle::after{content:'';position:absolute;top:3px;left:3px;width:24px;height:24px;border-radius:50%;background:#fff;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.2);}
.toggle.on::after{transform:translateX(20px);}

/* color picker for new list */
.color-grid{display:flex;gap:10px;flex-wrap:wrap;margin-top:4px;}
.color-opt{width:34px;height:34px;border-radius:50%;cursor:pointer;transition:.12s;border:3px solid transparent;}
.color-opt.on{transform:scale(1.12);box-shadow:0 0 0 2px #fff,0 0 0 4px currentColor;}

/* responsive */
@media(max-width:860px){
  #sidebar{display:none;}
  #bottomnav{display:flex;}
  .main-inner{padding:calc(20px + var(--safe-top)) 18px 130px;}
  .view-title{font-size:26px;}
  .fab{bottom:calc(80px + var(--safe-bottom));right:20px;width:56px;height:56px;}
  .spot-actions{grid-template-columns:1fr;}
}
@media(max-width:400px){
  .triage-actions{flex-direction:column;}
}

/* page transitions */
.view{animation:viewIn .26s ease;}
@keyframes viewIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.rcard.removing{animation:cardOut .25s forwards;}
@keyframes cardOut{to{opacity:0;transform:translateX(40px) scale(.96);height:0;margin:0;padding-top:0;padding-bottom:0;}}

/* ===================== MOTION LAYER ===================== */
/* Staggered card + section entrance — only on view navigation (gated by .stagger). */
@keyframes rcardIn{from{opacity:0;transform:translateY(16px) scale(.97);}to{opacity:1;transform:none;}}
.view.stagger .rcard{animation:rcardIn .44s cubic-bezier(.22,.7,.2,1) both;}
.view.stagger .section{animation:rcardIn .4s cubic-bezier(.22,.7,.2,1) both;}
.view.stagger .triage-banner{animation:rcardIn .42s cubic-bezier(.22,.7,.2,1) both;}
.view.stagger .empty,.view.stagger .all-clear{animation:cardIn .45s cubic-bezier(.22,.7,.2,1);}

/* Tactile press feedback across interactive elements. */
.rcard:active{transform:scale(.985);}
.check:active{transform:scale(.82);}
.lpill:active,.seg button:active,.btn:active,.resched-opt:active,.color-opt:active,
.ta-btn:active,.spot-btn:active,.nav-item:active,.bn-item:active,.rmini-btn:active,.tag-chip:active{transform:scale(.94);}

/* Completion burst — green fill + expanding ring, only on the completing card. */
.check{position:relative;}
.rcard.completing .check{background:var(--sage);border-color:var(--sage);animation:checkPop .36s cubic-bezier(.3,1.4,.5,1);}
.rcard.completing .check svg{opacity:1;transform:scale(1);}
.rcard.completing .check::after{content:'';position:absolute;inset:-3px;border-radius:50%;border:2px solid var(--sage);animation:ringBurst .55s ease-out forwards;}
@keyframes checkPop{0%{transform:scale(.5);}60%{transform:scale(1.2);}100%{transform:scale(1);}}
@keyframes ringBurst{0%{opacity:.55;transform:scale(1);}100%{opacity:0;transform:scale(2.2);}}

/* FAB — gentle idle float; the + spins on hover. */
@keyframes fabFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-4px);}}
.fab{animation:fabFloat 3.4s ease-in-out infinite;}
.fab:hover,.fab:active{animation:none;}
.fab svg{transition:transform .35s cubic-bezier(.3,1.4,.5,1);}
.fab:hover svg{transform:rotate(90deg);}

/* Overdue triage banner — drifting light sheen + breathing count. */
.triage-banner{position:relative;overflow:hidden;}
.triage-banner::after{content:'';position:absolute;top:0;left:-60%;width:55%;height:100%;
  background:linear-gradient(100deg,transparent,rgba(255,255,255,.30),transparent);
  transform:skewX(-18deg);animation:sheen 3.8s ease-in-out infinite;pointer-events:none;}
@keyframes sheen{0%{left:-60%;}55%,100%{left:135%;}}
.section.overdue .section-count{animation:countPulse 2.2s ease-in-out infinite;}
@keyframes countPulse{0%,100%{transform:scale(1);}50%{transform:scale(1.09);}}

/* Hover micro-lifts. */
.nav-item{transition:background .14s,transform .14s,color .14s;}
.nav-item:hover{transform:translateX(2px);}
.lpill{transition:transform .14s,box-shadow .14s,background .12s,color .12s,border-color .12s;}
.lpill:hover{transform:translateY(-1px);box-shadow:var(--shadow-sm);}
.rmini-btn{transition:background .12s,color .12s,transform .12s;}

/* Honour reduced-motion preference. */
@media(prefers-reduced-motion:reduce){
  *,*::after,*::before{animation-duration:.001ms!important;animation-iteration-count:1!important;transition-duration:.05ms!important;}
}
</style>
</head>

      Settings
    </button>
  </aside>

  <!-- MAIN -->
  <div id="main">
    <div id="main-scroll">
      <div class="main-inner">
        <div class="topbar">
          <h1 class="view-title" id="viewTitle">All Reminders</h1>
          <button class="icon-btn hidden" id="smartEditBtn" title="Edit smart list">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          <button class="icon-btn" id="boardToggle" title="Board view (B)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="5" height="16" rx="1.5"/><rect x="10" y="4" width="5" height="11" rx="1.5"/><rect x="17" y="4" width="4" height="14" rx="1.5"/></svg>
          </button>
          <button class="icon-btn" id="searchToggle" title="Search">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5" stroke-linecap="round"/></svg>
          </button>
        </div>
        <div class="view-sub" id="viewSub"></div>

        <div class="search-wrap hidden" id="searchWrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5" stroke-linecap="round"/></svg>
          <input id="searchInput" placeholder="Search reminders…" autocomplete="off">
          <button class="search-clear" id="searchClear"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 6l12 12M18 6 6 18" stroke-linecap="round"/></svg></button>
        </div>

        <div id="content"></div>

</div>

<!-- FAB -->

  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M12 5v14M5 12h14" stroke-linecap="round"/></svg>
</button>

<!-- BOTTOM NAV -->

    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h10" stroke-linecap="round"/></svg>

<!-- QUICK ADD SHEET -->
<div class="overlay" id="addOverlay">
  <div class="sheet" id="addSheet">
    <div class="sheet-handle"></div>
    <input id="qaTitle" placeholder="What do you need to remember?" autocomplete="off">

function fmtDue(iso, hasTime){
  if(!iso) return '';
  const d = new Date(iso), now = new Date();
  const diff = daysBetween(d, now);
  const timeStr = hasTime ? d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}) : '';
  let day;
  if(diff===0) day='Today';
  else if(diff===1) day='Tomorrow';
  else if(diff===-1) day='Yesterday';
  else if(diff<0 && diff>=-7) day=`${-diff} days ago`;
  else if(diff<0) day=d.toLocaleDateString('en-GB',{day:'numeric',month:'short'});
  else if(diff<=7) day=d.toLocaleDateString('en-GB',{weekday:'short'});
  else day=d.toLocaleDateString('en-GB',{day:'numeric',month:'short'});
  return timeStr ? `${day}, ${timeStr}` : day;
}
/* ---------- timezone pin helpers ---------- */
const TZ_LABEL={'Asia/Tokyo':'JST','Europe/London':'UK','America/New_York':'ET','America/Los_Angeles':'PT','Europe/Paris':'CET','Asia/Dubai':'GST','Asia/Singapore':'SGT','Australia/Sydney':'AEST','Asia/Kolkata':'IST'};
function partsInTz(iso, tz){
  const d=new Date(iso);
  const f=new Intl.DateTimeFormat('en-GB',{timeZone:tz,year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',hour12:false}).formatToParts(d).reduce((a,p)=>(a[p.type]=p.value,a),{});
  let hh=f.hour==='24'?'00':f.hour;
  return { date:`${f.year}-${f.month}-${f.day}`, time:`${hh}:${f.minute}` };
}
function wallToUTC(dateStr, timeStr, tz){
  if(!tz) return new Date(dateStr+'T'+timeStr).toISOString();
  const asUTC=new Date(`${dateStr}T${timeStr}:00Z`);
  const tzWall=new Date(asUTC.toLocaleString('en-US',{timeZone:tz}));
  const utcWall=new Date(asUTC.toLocaleString('en-US',{timeZone:'UTC'}));
  return new Date(asUTC.getTime()-(tzWall-utcWall)).toISOString();
}
function fmtDuePinned(iso, tz){
  const p=partsInTz(iso,tz), now=new Date();
  const d=new Date(p.date+'T'+(p.time||'00:00'));
  const diff=daysBetween(d, now);
  let day;
  if(diff===0) day='Today'; else if(diff===1) day='Tomorrow'; else if(diff===-1) day='Yesterday';
  else if(diff>0&&diff<=7) day=d.toLocaleDateString('en-GB',{weekday:'short'});
  else day=d.toLocaleDateString('en-GB',{day:'numeric',month:'short'});
  const label=TZ_LABEL[tz]||tz.split('/').pop().replace('_',' ');
  return `${day}, ${p.time} ${label}`;
}

  if(d<60) return '1 month overdue';
  return `${Math.floor(d/30)} months overdue`;
}
/* ---------- natural-language date parser ---------- */
function parseNaturalDate(text){
  if(!text) return null;
  const orig=text, lower=' '+text.toLowerCase()+' ';
  const now=new Date(), pad=n=>String(n).padStart(2,'0');
  const setD=d=>`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  let date=null, time=null, hits=[];
  const months={jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11};
  const wdays={sun:0,sunday:0,mon:1,monday:1,tue:2,tuesday:2,wed:3,wednesday:3,thu:4,thursday:4,fri:5,friday:5,sat:6,saturday:6};
  let t;
  if(t=lower.match(/\b(\d{1,2}):(\d{2})\s*(am|pm)?\b/)){ let h=+t[1],mn=+t[2]; if(t[3]==='pm'&&h<12)h+=12; if(t[3]==='am'&&h===12)h=0; time=`${pad(h)}:${pad(mn)}`; hits.push(t[0]); }
  else if(t=lower.match(/\b(\d{1,2})\s*(am|pm)\b/)){ let h=+t[1]; if(t[2]==='pm'&&h<12)h+=12; if(t[2]==='am'&&h===12)h=0; time=`${pad(h)}:00`; hits.push(t[0]); }
  else if(/\bnoon\b/.test(lower)){ time='12:00'; hits.push('noon'); }
  else if(/\bmidnight\b/.test(lower)){ time='00:00'; hits.push('midnight'); }
  let m;
  if(/\btoday\b/.test(lower)){ date=setD(now); hits.push('today'); }
  else if(/\btonight\b/.test(lower)){ date=setD(now); if(!time)time='20:00'; hits.push('tonight'); }
  else if(/\btomorrow\b/.test(lower)){ const d=new Date(now); d.setDate(d.getDate()+1); date=setD(d); hits.push('tomorrow'); }
  else if(m=lower.match(/\bin\s+(\d{1,3})\s+(day|week|month)s?\b/)){ const n=+m[1],d=new Date(now); if(m[2]==='day')d.setDate(d.getDate()+n); else if(m[2]==='week')d.setDate(d.getDate()+7*n); else d.setMonth(d.getMonth()+n); date=setD(d); hits.push(m[0]); }
  else if(m=lower.match(/\bnext\s+(week|month|year)\b/)){ const d=new Date(now); if(m[1]==='week')d.setDate(d.getDate()+7); else if(m[1]==='month')d.setMonth(d.getMonth()+1); else d.setFullYear(d.getFullYear()+1); date=setD(d); hits.push(m[0]); }
  else if(m=lower.match(/\b(next\s+)?(sunday|monday|tuesday|wednesday|thursday|friday|saturday|sun|mon|tue|wed|thu|fri|sat)\b/)){ const target=wdays[m[2]],d=new Date(now); let add=(target-d.getDay()+7)%7; if(add===0)add=7; d.setDate(d.getDate()+add); date=setD(d); hits.push(m[0]); }
  else if((m=lower.match(/\b(\d{1,2})(?:st|nd|rd|th)?\s+(jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec)[a-z]*\b/))||(m=lower.match(/\b(jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec)[a-z]*\s+(\d{1,2})(?:st|nd|rd|th)?\b/))){ let day,mon; if(/^\d/.test(m[1])){day=+m[1];mon=months[m[2].slice(0,3)];}else{mon=months[m[1].slice(0,3)];day=+m[2];} const d=new Date(now.getFullYear(),mon,day); if(d<todayStart())d.setFullYear(d.getFullYear()+1); date=setD(d); hits.push(m[0]); }
  else if(m=lower.match(/\b(\d{1,2})\/(\d{1,2})(?:\/(\d{2,4}))?\b/)){ const day=+m[1],mon=+m[2]-1; let yr=m[3]?(m[3].length===2?2000+ +m[3]:+m[3]):now.getFullYear(); const d=new Date(yr,mon,day); if(!m[3]&&d<todayStart())d.setFullYear(d.getFullYear()+1); date=setD(d); hits.push(m[0]); }
  if(time && !date){ const [hh,mn]=time.split(':'), cand=new Date(now); cand.setHours(+hh,+mn,0,0); const d=new Date(now); if(cand<now)d.setDate(d.getDate()+1); date=setD(d); }
  if(!date && !time) return null;
  let title=' '+orig+' ';
  hits.forEach(h=>{ title=title.replace(new RegExp(h.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'i'),' '); });
  title=title.replace(/\s+(at|on|by|due|every|this)\s*$/i,' ').replace(/\s{2,}/g,' ').trim();
  return { date, time, title: title || orig.trim() };
}

function isOverdue(r){ return r.dueDate && !r.completed && new Date(r.dueDate) < new Date() && !isSnoozed(r); }
function isSnoozed(r){ return r.snoozedUntil && new Date(r.snoozedUntil) > new Date(); }
function listById(id){ return state.lists.find(l=>l.id===id) || DEFAULT_LISTS[0]; }
function getTags(r){ return (String(r.title||'').match(/#[\p{L}0-9_-]+/gu)||[]).map(t=>t.slice(1).toLowerCase()); }
function displayTitle(r){ const s=String(r.title||'').replace(/#[\p{L}0-9_-]+/gu,'').replace(/\s{2,}/g,' ').trim(); return s||String(r.title||''); }
function allTags(){ const s=new Set(); state.reminders.forEach(r=>{ if(!r.completed) getTags(r).forEach(t=>s.add(t)); }); return [...s].sort(); }

/* ---------- persistence (localStorage-first, Supabase-ready) ---------- */
const LS_KEY = 'nudge.data.v1';
let saveTimer=null, syncTimer=null;

function loadLocal(){
  try{
    const raw = localStorage.getItem(LS_KEY);
    if(raw){ const d=JSON.parse(raw); state.reminders=d.reminders||[]; state.lists=d.lists||[]; state.smartLists=d.smartLists||[]; state.settings={...state.settings,...(d.settings||{})}; }
  }catch(e){ console.warn('load failed',e); }
  if(!state.lists.length) state.lists = DEFAULT_LISTS.map(l=>({...l}));
}
function persist(){
  localStorage.setItem(LS_KEY, JSON.stringify({reminders:state.reminders, lists:state.lists, smartLists:state.smartLists, settings:state.settings}));
  if(CLOUD){ setSync('syncing'); clearTimeout(syncTimer); syncTimer=setTimeout(cloudPush, 800); }
}
async function cloudPush(){
  try{
    const res = await fetch(`${SUPABASE.url}/rest/v1/nudge_data?user_key=eq.${SUPABASE.userKey}`,{
      method:'POST',
      headers:{ apikey:SUPABASE.anon, Authorization:`Bearer ${SUPABASE.anon}`, 'Content-Type':'application/json', Prefer:'resolution=merge-duplicates' },
      body: JSON.stringify({ user_key:SUPABASE.userKey, data:{reminders:state.reminders, lists:state.lists, smartLists:state.smartLists, settings:state.settings}, updated_at:new Date().toISOString() })
    });
    setSync(res.ok ? 'synced' : 'local');
  }catch(e){ setSync('local'); }
}
async function cloudPull(){
  try{
    const res = await fetch(`${SUPABASE.url}/rest/v1/nudge_data?user_key=eq.${SUPABASE.userKey}&select=data`,{
      headers:{ apikey:SUPABASE.anon, Authorization:`Bearer ${SUPABASE.anon}` }
    });
    if(!res.ok) throw new Error('HTTP '+res.status);
    const rows = await res.json();
    if(rows && rows[0] && rows[0].data){
      const d = rows[0].data;
      state.reminders=d.reminders||state.reminders; state.lists=d.lists||state.lists; state.smartLists=d.smartLists||state.smartLists; state.settings={...state.settings,...(d.settings||{})};
    }
    setSync('synced');   // connection succeeded — synced even if the remote row is empty
  }catch(e){ console.warn('cloud pull failed', e); setSync('local'); }
}
// Self-heal: collapse exact-duplicate reminders (same title + due + list + notes).
// External imports (e.g. Apple Reminders) re-add the same item with brand-new ids,
// which id-based de-dupe can't catch; this guarantees they never pile up again.
function dedupeReminders(){
  const seen=new Map(), out=[];
  for(const r of state.reminders){
    const k=[(r.title||'').trim(),(r.dueDate||''),(r.listId||''),((r.notes||'').trim())].join('');
    if(!seen.has(k)){ seen.set(k,out.length); out.push(r); }
    else { const i=seen.get(k); if(r.completed && !out[i].completed) out[i]=r; } // keep the done copy
  }
  const removed=state.reminders.length-out.length;
  if(removed>0) state.reminders=out;
  return removed;
}
// Auto-tidy: drop reminders completed more than `days` ago (default 3 weeks). Routines
// never "complete" (they roll forward), so completed:false keeps them safe. Items with
// no completedAt are left alone (age unknown). Mirrors iOS purgeOldCompleted().
function purgeOldCompleted(days=21){
  const cutoff=Date.now()-days*86400000;
  const before=state.reminders.length;
  state.reminders=state.reminders.filter(r=>{
    if(!r.completed || !r.completedAt) return true;
    return new Date(r.completedAt).getTime()>=cutoff;
  });
  return before-state.reminders.length;
}
function setSync(status){
  const pill=$('#syncPill'), label=$('#syncLabel');
  if(!pill) return;
  pill.className='sync-pill '+status;
  label.textContent = status==='synced'?'Synced':status==='syncing'?'Syncing…':CLOUD?'Offline':'Local only';
}

/* ---------- recurrence ---------- */
function nextOccurrence(r){
  if(!r.recurrence || !r.dueDate) return null;
  const f=r.recurrence.freq, iv=r.recurrence.interval||1;
  const d=new Date(r.dueDate), now=new Date();
  let guard=0;
  do {
    if(f==='hourly') d.setHours(d.getHours()+iv);
    else if(f==='daily') d.setDate(d.getDate()+iv);
    else if(f==='weekly') d.setDate(d.getDate()+7*iv);
    else if(f==='monthly') d.setMonth(d.getMonth()+iv);
    else if(f==='yearly') d.setFullYear(d.getFullYear()+iv);
    else break;
  } while(d < now && ++guard < 2000);   // advance to the next FUTURE occurrence
  if(r.recurrence.until && d > new Date(r.recurrence.until)) return null;  // respect end-repeat
  return d.toISOString();
}
function recurText(rec){
  if(!rec) return '';
  const iv=rec.interval||1, f=rec.freq;
  const unit={hourly:'hour',daily:'day',weekly:'week',monthly:'month',yearly:'year'}[f]||f;
  let base = iv===1 ? `every ${unit}` : `every ${iv} ${unit}s`;
  if(rec.until){ base += ' until '+new Date(rec.until).toLocaleDateString(undefined,{day:'numeric',month:'short'}); }
  return base;
}
function remindBeforeText(m){
  if(m==null) return '';
  if(m<60) return m+' min before';
  if(m<1440) return (m/60)+' hr before';
  if(m<10080){ const d=m/1440; return d+' day'+(d>1?'s':'')+' before'; }
  const w=m/10080; return w+' week'+(w>1?'s':'')+' before';
}
/* Effective early-alert offsets (multiple field, falling back to legacy single). */
function effEarly(r){ return (r.remindBefores&&r.remindBefores.length)?r.remindBefores.slice():(r.remindBefore!=null?[r.remindBefore]:[]); }

/* ---------- CRUD ---------- */
function addReminder(data){
  const r = {
    id:uuid(), title:data.title.trim(), notes:data.notes||'',
    dueDate:data.dueDate||null, hasTime:!!data.hasTime, listId:data.listId||'reminders',
    priority:data.priority||'normal', completed:false, completedAt:null,
    recurrence: data.repeat&&data.repeat!=='none' ? {freq:data.repeat,interval:1} : null,
    subtasks: data.subtasks||[],
    remindBefore: data.remindBefore??null,
    remindBefores: data.remindBefores??null,
    tz: data.tz??null,
    createdAt:new Date().toISOString(), updatedAt:new Date().toISOString(), source:data.source||'manual', snoozedUntil:null, dismissed:false,
  };
  state.reminders.unshift(r); persist(); return r;
}
function updateReminder(id, patch){
  const r=state.reminders.find(x=>x.id===id); if(!r) return;
  Object.assign(r, patch);
  r.updatedAt=new Date().toISOString();   // so the Apple-sync sees this as the newest edit (was getting reverted)
  persist();
}
/* Payday: 15th at 09:00, or the Friday before if the 15th is a weekend (mirror of iOS Payday.swift). */
function paydayInMonth(date){
  const d=new Date(date.getFullYear(), date.getMonth(), 15, 9, 0, 0, 0);
  const wd=d.getDay();                 // 0=Sun … 6=Sat
  if(wd===6) d.setDate(14);            // Sat → Fri 14
  else if(wd===0) d.setDate(13);       // Sun → Fri 13
  return d;
}
function nextPayday(from){
  from=from||new Date();
  const sod=x=>new Date(x.getFullYear(),x.getMonth(),x.getDate());
  const thisP=paydayInMonth(from);
  if(sod(thisP)>=sod(from)) return thisP;
  return paydayInMonth(new Date(from.getFullYear(), from.getMonth()+1, 15));
}
function routineIntervalDays(r){
  if(Array.isArray(r.escalation) && r.escalation.length){
    const now=Date.now();
    for(const s of r.escalation){ if(s.until==null) return Math.max(1,s.everyDays); if(now < Date.parse(s.until)) return Math.max(1,s.everyDays); }
    return Math.max(1, r.escalation[r.escalation.length-1].everyDays||1);
  }
  if(r.recurrence){ if(r.recurrence.freq==='daily') return Math.max(1,r.recurrence.interval||1); if(r.recurrence.freq==='weekly') return 7*Math.max(1,r.recurrence.interval||1); }
  return 1;
}
function completeReminder(id){
  const r=state.reminders.find(x=>x.id===id); if(!r) return;
  // Nightly routines never "complete" — ticking = "did it", roll the due date forward
  // in place (no spawned copy), matching the iOS app's morning check-in.
  if(r.routine && !r.completed){
    const base=r.dueDate?new Date(r.dueDate):new Date();
    const step=routineIntervalDays(r);
    do { base.setDate(base.getDate()+step); } while(base.getTime()<=Date.now());
    r.dueDate=base.toISOString(); r.completed=false; r.completedAt=new Date().toISOString(); r.snoozedUntil=null; r.updatedAt=new Date().toISOString();
    persist(); return;
  }
  if(!r.completed && r.recurrence && r.dueDate){
    const next=nextOccurrence(r);
    if(next){ addReminder({title:r.title,notes:r.notes,dueDate:next,hasTime:r.hasTime,listId:r.listId,priority:r.priority,repeat:r.recurrence.freq,source:r.source}); }
  }
  r.completed=!r.completed; r.completedAt=r.completed?new Date().toISOString():null; r.snoozedUntil=null; r.updatedAt=new Date().toISOString();
  persist();
}
function deleteReminder(id){ state.reminders=state.reminders.filter(x=>x.id!==id); persist(); }
function snoozeReminder(id, days){
  const r=state.reminders.find(x=>x.id===id); if(!r) return;
  const base = r.dueDate && new Date(r.dueDate)>new Date() ? new Date(r.dueDate) : new Date();
  base.setDate(base.getDate()+days); base.setHours(9,0,0,0);
  r.dueDate=base.toISOString(); r.hasTime=true; r.snoozedUntil=null; persist();
}

/* ---------- filtering / grouping ---------- */
function visibleReminders(){
  let rs = state.reminders.filter(r=>!r.completed);
  if(ui.search){ const q=ui.search.toLowerCase(); rs=rs.filter(r=>r.title.toLowerCase().includes(q)||(r.notes||'').toLowerCase().includes(q)); }
  if(ui.view==='list-detail') rs=rs.filter(r=>r.listId===ui.list);
  if(ui.view==='tag') rs=rs.filter(r=>getTags(r).includes(ui.tag));
  if(ui.view==='smart'){ const sl=(state.smartLists||[]).find(s=>s.id===ui.smartId); if(sl) rs=rs.filter(r=>matchSmart(r,sl.rules)); }
  if(ui.view==='today'){ const t=todayStart(); rs=rs.filter(r=>r.dueDate && startOfDay(r.dueDate)<=t); }
  if(ui.view==='scheduled') rs=rs.filter(r=>r.dueDate);
  return rs;
}
function groupReminders(rs){
  const now=new Date(), t=todayStart(), wk=new Date(t); wk.setDate(wk.getDate()+7);
  const g={overdue:[],today:[],upcoming:[],nodate:[]};
  rs.forEach(r=>{
    if(!r.dueDate){ g.nodate.push(r); return; }
    const d=new Date(r.dueDate);
    if(isSnoozed(r)){ g.upcoming.push(r); return; }
    if(d<now && startOfDay(d)<t){ g.overdue.push(r); }
    else if(startOfDay(d).getTime()===t.getTime()){ d<now?g.overdue.push(r):g.today.push(r); }
    else if(d<=wk){ g.upcoming.push(r); }
    else g.upcoming.push(r);
  });
  const byDate=(a,b)=>new Date(a.dueDate)-new Date(b.dueDate);
  g.overdue.sort(byDate); g.today.sort(byDate); g.upcoming.sort(byDate);
  return g;
}
function allOverdue(){ return state.reminders.filter(isOverdue).sort((a,b)=>new Date(a.dueDate)-new Date(b.dueDate)); }
function matchSmart(r, rules){
  if(!rules) return false;
  if(rules.tags && rules.tags.length){ const tg=getTags(r); if(!rules.tags.every(t=>tg.includes(t))) return false; }
  if(rules.priority && r.priority!==rules.priority) return false;
  if(rules.overdue && !isOverdue(r)) return false;
  if(rules.noDate && r.dueDate) return false;
  if(rules.listId && r.listId!==rules.listId) return false;
  return true;
}
function smartCount(sl){ return state.reminders.filter(r=>!r.completed && matchSmart(r,sl.rules)).length; }

/* ---------- RENDER ---------- */
let _lastViewKey=null;
function render(){
  renderSidebar();
  renderCounts();
  if($('#smartEditBtn')) $('#smartEditBtn').classList.toggle('hidden', ui.view!=='smart');
  const c=$('#content');
  // Stagger card entrance only when navigating to a new view, not on every
  // data re-render (otherwise completing a task replays the whole cascade).
  const _vk=JSON.stringify([ui.view,ui.list,ui.tag,ui.smartId,!!ui.board,!!ui.search]);
  const viewCls = (_vk!==_lastViewKey) ? 'view stagger' : 'view';
  _lastViewKey=_vk;
  if(ui.view==='settings'){ c.innerHTML=renderSettings(); bindSettings(); $('#viewTitle').textContent='Settings'; $('#viewSub').textContent=''; setSearchVisible(false); return; }
  if(ui.view==='lists'){ c.innerHTML=renderListsGrid(); bindListsGrid(); $('#viewTitle').textContent='Lists'; $('#viewSub').textContent=`${state.lists.length} lists`; setSearchVisible(false); return; }

  // titles
  let title='All Reminders', sub='', dot='';
  if(ui.view==='today'){ title='Today'; sub=new Date().toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'}); }
  else if(ui.view==='scheduled'){ title='Scheduled'; sub='Everything with a due date'; }
  else if(ui.view==='list-detail'){ const l=listById(ui.list); title=l.name; dot=l.color; const n=state.reminders.filter(r=>r.listId===l.id&&!r.completed).length; sub=`${n} open`; }
  else if(ui.view==='tag'){ title='#'+ui.tag; sub='Tagged reminders'; dot='#5B4FCF'; }
  else if(ui.view==='smart'){ const sl=(state.smartLists||[]).find(s=>s.id===ui.smartId); title=sl?sl.name:'Smart List'; dot=sl?sl.color:''; sub='Smart list'; }
  else { const open=state.reminders.filter(r=>!r.completed).length; sub = open?`${open} open · stay on top of it`:'You\'re all caught up'; }
  $('#viewTitle').innerHTML = (dot?`<span class="vt-dot" style="background:${dot}"></span>`:'') + title;
  $('#viewSub').textContent = sub;

  const canBoard = ['all','today','scheduled'].includes(ui.view);
  if($('#boardToggle')){ $('#boardToggle').classList.toggle('hidden', !canBoard); $('#boardToggle').classList.toggle('active', ui.board && canBoard); }
  if(ui.board && canBoard){
    let bhtml=''; const oc=allOverdue().length;
    if(oc>0 && !ui.search) bhtml+=triageBannerHTML(oc);
    bhtml+=renderBoard();
    c.innerHTML=`<div class="${viewCls}">${bhtml}</div>`;
    bindBoard();
    const tb=$('#triageBanner'); if(tb) tb.onclick=startTriage;
    return;
  }

  const rs = visibleReminders();
  const g = groupReminders(rs);
  let html='';

  // triage banner (only on all/today views, when overdue exist, not searching)
  const overdueCount = allOverdue().length;
  if(overdueCount>0 && !ui.search && (ui.view==='all'||ui.view==='today')) html += triageBannerHTML(overdueCount);

  if(rs.length===0){
    html += ui.search ? emptyState('🔍','No matches','Nothing matches "'+ui.search+'". Try another search.')
      : emptyState('🌿','All clear','No reminders here. Tap + to add one and get it off your mind.');
  } else {
    if(g.overdue.length) html+=section('overdue','Overdue',g.overdue,true);
    if(g.today.length) html+=section('today','Today',g.today);
    if(g.upcoming.length) html+=section('upcoming','Upcoming',g.upcoming);
    if(g.nodate.length) html+=section('nodate','No Date',g.nodate);
  }

  c.innerHTML = `<div class="${viewCls}">${html}</div>`;
  bindCards();
  const tb=$('#triageBanner'); if(tb) tb.onclick=startTriage;
}

function section(key,label,items,overdue){

function renderBoard(){
  const rs=visibleReminders();

function boardCard(r){

function bindBoard(){
  $$('.board-card').forEach(card=>{
    const id=card.dataset.id;
    card.querySelector('[data-act=complete]').onclick=(e)=>{ e.stopPropagation(); card.style.opacity='.4'; completeReminder(id); showToast('Completed','Undo',()=>{completeReminder(id);render();}); setTimeout(render,150); };

  });
}

function bindCards(){
  $$('.rcard').forEach(card=>{
    const id=card.dataset.id;
    card.querySelectorAll('[data-act]').forEach(el=>{
      el.onclick=(e)=>{
        e.stopPropagation();
        const act=el.dataset.act;
        if(act==='complete'){ animateComplete(card,id); }
        else if(act==='edit'){ openEdit(id); }
        else if(act==='delete'){ animateDelete(card,id,true); }
      };
    });
    card.querySelectorAll('.tag-chip').forEach(tc=>tc.onclick=(e)=>{
      e.stopPropagation();
      ui.view='tag'; ui.tag=tc.dataset.tag; ui.search=''; $('#searchInput').value=''; $('#searchClear').style.display='none';
      $$('#bottomnav .bn-item').forEach(b=>b.classList.remove('active'));
      $('#main-scroll').scrollTop=0; render();
    });
  });
}
function animateComplete(card,id){
  const r=state.reminders.find(x=>x.id===id);
  card.classList.add('removing','completing');
  completeReminder(id);
  showToast(r&&r.recurrence?'Done · next one scheduled':'Completed', 'Undo', ()=>{ completeReminder(id); render(); });
  setTimeout(render, 240);
}
function animateDelete(card,id,confirm){
  const r=state.reminders.find(x=>x.id===id);
  card.classList.add('removing');
  const snapshot={...r};
  deleteReminder(id);
  showToast('Deleted','Undo',()=>{ state.reminders.unshift(snapshot); persist(); render(); });
  setTimeout(render, 240);
}

/* ============ QUICK ADD ============ */
function openAdd(){
  ui.editingId=null;
  ui.qa={ date:null, time:null, repeat:'none', pri:'normal', list: ui.view==='list-detail'?ui.list:'reminders', dateManual:false, nlSource:null, nlClean:null, subtasks:[] };
  $('#qaTitle').value=''; $('#qaNotes').value=''; $('#qaDate').value=''; $('#qaTime').value=''; if($('#qaSubInput'))$('#qaSubInput').value=''; if($('#qaRemindBefore'))$('#qaRemindBefore').value=''; if($('#qaTz'))$('#qaTz').value='';
  $('#qaSave').textContent='Add Reminder'; $('#qaSave').disabled=true; $('#qaDelete').style.display='none';
  $('#qaDetail').classList.remove('show'); $('#qaMoreToggle').classList.remove('open');
  syncQAChips(); buildListPills(); renderQASubtasks(); setSeg('#qaRepeat','rep','none'); setSeg('#qaPriSeg','pri','normal');
  showOverlay('#addOverlay'); setTimeout(()=>$('#qaTitle').focus(),250);
}
function openEdit(id){
  const r=state.reminders.find(x=>x.id===id); if(!r) return;
  ui.editingId=id;
  let _dp=null,_tp=null;
  if(r.dueDate){ if(r.tz){ const p=partsInTz(r.dueDate,r.tz); _dp=p.date; _tp=r.hasTime?p.time:null; } else { _dp=r.dueDate.slice(0,10); _tp=r.hasTime?new Date(r.dueDate).toTimeString().slice(0,5):null; } }
  ui.qa={
    date:_dp, time:_tp,
    repeat: r.recurrence?r.recurrence.freq:'none', pri:r.priority, list:r.listId,
    subtasks:(r.subtasks||[]).map(s=>({...s})), dateManual:true, nlSource:null, nlClean:null
  };
  $('#qaTitle').value=r.title; $('#qaNotes').value=r.notes||'';
  $('#qaDate').value=ui.qa.date||''; $('#qaTime').value=ui.qa.time||'';
  if($('#qaRemindBefore')){ const ea=effEarly(r); $('#qaRemindBefore').value=ea.length?String(ea[0]):''; }
  if($('#qaTz'))$('#qaTz').value=r.tz||'';
  $('#qaSave').textContent='Save Changes'; $('#qaSave').disabled=false; $('#qaDelete').style.display='';
  $('#qaDetail').classList.add('show'); $('#qaMoreToggle').classList.add('open');
  syncQAChips(); buildListPills(); renderQASubtasks(); setSeg('#qaRepeat','rep',ui.qa.repeat); setSeg('#qaPriSeg','pri',ui.qa.pri);
  showOverlay('#addOverlay'); setTimeout(()=>$('#qaTitle').focus(),250);
}
function syncQAChips(){
  const dl=$('#chipDateLabel'), dc=$('#chipDate');
  if(ui.qa.date){ const d=new Date(ui.qa.date+'T'+(ui.qa.time||'12:00')); dl.textContent=fmtDue(d.toISOString(),!!ui.qa.time); dc.classList.add('set'); }
  else { dl.textContent='Date'; dc.classList.remove('set'); }
  const l=listById(ui.qa.list); $('#chipListLabel').textContent=l.name; $('#chipListDot').style.background=l.color; $('#chipList').classList.add('set');
  const pc=$('#chipPri'), pl=$('#chipPriLabel');
  if(ui.qa.pri==='high'){ pl.textContent='High'; pc.classList.add('set'); }
  else if(ui.qa.pri==='low'){ pl.textContent='Low'; pc.classList.add('set'); }
  else { pl.textContent='Priority'; pc.classList.remove('set'); }
}
function buildListPills(){

function renderQASubtasks(){

  wrap.innerHTML = subs.map(s=>`<div class="sub-row ${s.done?'done':''}" data-id="${s.id}">

    row.querySelector('[data-sact=toggle]').onclick=()=>{ const s=ui.qa.subtasks.find(x=>x.id===id); s.done=!s.done; renderQASubtasks(); };

function addQASub(){
  const inp=$('#qaSubInput'), v=inp.value.trim(); if(!v) return;
  ui.qa.subtasks.push({id:uuid(), title:v, done:false});
  inp.value=''; renderQASubtasks(); inp.focus();
}
function setSeg(sel,attr,val){
  $$(`${sel} button`).forEach(b=>b.classList.toggle('on', b.dataset[attr]===val));
}
function saveQA(){
  let title=$('#qaTitle').value.trim(); if(!title) return;
  if(!ui.editingId && ui.qa.nlClean && ui.qa.nlSource===title && ui.qa.nlClean.length>1) title=ui.qa.nlClean;
  const tz = $('#qaTz') && $('#qaTz').value ? $('#qaTz').value : null;
  // Buy-keyword rule (mirrors iOS): a NEW "buy …" reminder goes to Shopping, due the
  // next payday at 09:00 (the 15th, or the Friday before if it's a weekend).
  if(!ui.editingId && /\bbuy\b/i.test(title)){
    if(state.lists.some(l=>l.id==='shopping')) ui.qa.list='shopping';
    const p=nextPayday(); const pad=n=>String(n).padStart(2,'0');
    ui.qa.date=`${p.getFullYear()}-${pad(p.getMonth()+1)}-${pad(p.getDate())}`;
    ui.qa.time='09:00';
  }
  let dueDate=null, hasTime=false;
  if(ui.qa.date){
    const t=ui.qa.time||'09:00'; hasTime=!!ui.qa.time;
    dueDate=wallToUTC(ui.qa.date, t, tz);
  }
  const existing = ui.editingId ? state.reminders.find(x=>x.id===ui.editingId) : null;
  const sameFreq = existing && existing.recurrence && existing.recurrence.freq===ui.qa.repeat;
  const recurrence = ui.qa.repeat!=='none'
    ? { freq:ui.qa.repeat,
        interval:(sameFreq?existing.recurrence.interval:1),
        until:(sameFreq && existing.recurrence.until)?existing.recurrence.until:null }   // keep end-repeat date set on iOS
    : null;
  const remindBefore = $('#qaRemindBefore') && $('#qaRemindBefore').value ? +$('#qaRemindBefore').value : null;
  const remindBefores = remindBefore!=null ? [remindBefore] : null;   // web sets one; iOS can set many
  const payload={ title, notes:$('#qaNotes').value.trim(), dueDate, hasTime, listId:ui.qa.list, priority:ui.qa.pri, repeat:ui.qa.repeat, subtasks:ui.qa.subtasks, remindBefore, remindBefores, tz };
  if(ui.editingId){
    updateReminder(ui.editingId,{
      title, notes:payload.notes, dueDate, hasTime, listId:ui.qa.list, priority:ui.qa.pri,
      recurrence, subtasks:ui.qa.subtasks, remindBefore, remindBefores, tz
    });
    showToast('Saved');
  } else { addReminder(payload); showToast('Added'); }
  hideOverlay('#addOverlay'); render();
}
