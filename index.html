/* ============ TRIAGE ENGINE ============ */
function startTriage(){
  const overdue=allOverdue();
  if(!overdue.length){ showToast('Nothing overdue 🎉'); return; }
  ui.triage={ active:true, stage:1, queue:overdue.slice(), idx:0, batchSel:new Set(), rescheduleId:null,
    stats:{relevant:0,dismissed:0,done:0,rescheduled:0} };
  $('#triage').classList.add('show');
  renderTriage();
}
function endTriage(){
  $('#triage').classList.remove('show'); ui.triage.active=false; render();
}
function renderTriage(){
  const t=ui.triage;
  const body=$('#triageBody'); const bar=$('#triageBar'); const label=$('#triageStageLabel');
  if(t.stage===1){
    label.textContent='Stage 1 of 3 · Still relevant?';
    const remaining=t.queue.length-t.idx;
    bar.style.width = `${33*(t.idx/Math.max(t.queue.length,1))}%`;
    if(t.idx===0 && !t.started1){
      t.started1=true;
      body.innerHTML=`<div class="stage-intro">
        <div class="si-emoji">🧹</div>
        <h2>Quick relevance sweep</h2>
        <p>One at a time — is this still worth keeping? Bin the dead weight fast, deal with the keepers after.</p>
        <div class="stage-stat"><b>${t.queue.length}</b> overdue to sweep</div>
        <div class="triage-foot"><button class="btn btn-primary" id="startSweep">Start sweeping →</button></div>
      </div>`;
      $('#startSweep').onclick=()=>{ renderTriage(); };
      return;
    }
    if(t.idx>=t.queue.length){ enterStage2(); return; }
    const r=t.queue[t.idx]; const l=listById(r.listId);
    body.innerHTML=`<div style="width:100%;">
      <div class="triage-stage-num" style="text-align:center;margin-bottom:14px;">${t.idx+1} of ${t.queue.length}</div>
      <div class="relev-card">
        <div class="rc-age">${IC.clock}${ageText(r.dueDate)}</div>
        <div class="rc-title">${esc(r.title)}</div>
        <div class="rc-list"><span class="list-dot" style="background:${l.color}"></span>${esc(l.name)}</div>
        ${r.notes?`<div class="rc-note">${esc(r.notes)}</div>`:''}
      </div>
      <div class="triage-actions">
        <button class="ta-btn ta-no" id="taNo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m2 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6" stroke-linecap="round" stroke-linejoin="round"/></svg>Not anymore</button>
        <button class="ta-btn ta-yes" id="taYes"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12l5 5L20 7" stroke-linecap="round" stroke-linejoin="round"/></svg>Still relevant</button>
      </div>
    </div>`;
    $('#taYes').onclick=()=>{ r._keep=true; t.stats.relevant++; t.idx++; renderTriage(); };
    $('#taNo').onclick=()=>{ deleteReminder(r.id); t.stats.dismissed++; t.idx++; renderTriage(); };
  }
  else if(t.stage===2){ renderStage2(); }
  else if(t.stage===3){ renderStage3(); }
}

function enterStage2(){
  const t=ui.triage;
  // keepers only
  const keepers=t.queue.filter(r=>r._keep && state.reminders.find(x=>x.id===r.id));
  // old = 14+ days overdue
  const old=keepers.filter(r=> -daysBetween(new Date(r.dueDate),new Date()) >=14 );
  if(old.length<2){ // not worth a batch stage
    t.stage=3; t.queue3=keepers; t.idx=0; renderTriage(); return;
  }
  t.stage=2; t.batchItems=old; t.batchSel=new Set(old.map(r=>r.id)); t.keepers=keepers;
  renderTriage();
}
function renderStage2(){
  const t=ui.triage;
  $('#triageStageLabel').textContent='Stage 2 of 3 · Clear the stale pile';
  $('#triageBar').style.width='66%';
  const body=$('#triageBody');
  body.innerHTML=`<div style="width:100%;">
    <div class="stage-intro" style="margin-bottom:8px;">
      <div class="si-emoji" style="font-size:46px;margin-bottom:12px;">📦</div>
      <h2 style="font-size:22px;">${t.batchItems.length} items are 2+ weeks old</h2>
      <p style="margin-bottom:16px;">These have sat the longest. Untick anything you want to keep — the rest get cleared in one tap.</p>
    </div>
    <div class="batch-list" id="batchList">
      ${t.batchItems.map(r=>`<div class="batch-row sel" data-id="${r.id}">
        <div class="batch-check">${IC.check}</div>
        <div class="batch-info"><div class="batch-title">${esc(r.title)}</div><div class="batch-age">${ageText(r.dueDate)}</div></div>
      </div>`).join('')}
    </div>
    <div class="triage-foot">
      <button class="btn btn-ghost" id="batchSkip">Keep all</button>
      <button class="btn btn-danger" id="batchClear">Clear <span id="batchN">${t.batchSel.size}</span></button>
    </div>
  </div>`;
  $$('#batchList .batch-row').forEach(row=>row.onclick=()=>{
    const id=row.dataset.id;
    if(t.batchSel.has(id)){ t.batchSel.delete(id); row.classList.remove('sel'); }
    else { t.batchSel.add(id); row.classList.add('sel'); }
    $('#batchN').textContent=t.batchSel.size;
    $('#batchClear').style.display = t.batchSel.size?'':'none';
  });
  $('#batchSkip').onclick=()=>{ t.stage=3; t.queue3=t.keepers; t.idx=0; renderTriage(); };
  $('#batchClear').onclick=()=>{
    t.batchSel.forEach(id=>{ deleteReminder(id); t.stats.dismissed++; });
    t.keepers=t.keepers.filter(r=>!t.batchSel.has(r.id));
    t.stage=3; t.queue3=t.keepers; t.idx=0; renderTriage();
  };
}

function renderStage3(){
  const t=ui.triage;
  $('#triageStageLabel').textContent='Stage 3 of 3 · Decide on the rest';
  const total=t.queue3.length;
  $('#triageBar').style.width = `${66+34*((t.idx)/Math.max(total,1))}%`;
  const body=$('#triageBody');
  // skip already-handled
  while(t.idx<t.queue3.length && !state.reminders.find(x=>x.id===t.queue3[t.idx].id && isOverdue(x))) t.idx++;
  if(t.idx>=t.queue3.length || total===0){ renderTriageDone(); return; }
  const r=t.queue3[t.idx]; const l=listById(r.listId);
  $('#triageBar').style.width = `${66+34*((t.idx)/Math.max(total,1))}%`;
  body.innerHTML=`<div style="width:100%;">
    <div class="triage-stage-num" style="text-align:center;margin-bottom:14px;">${t.idx+1} of ${total} keepers</div>
    <div class="relev-card">
      <div class="rc-age">${IC.clock}${ageText(r.dueDate)}</div>
      <div class="rc-title">${esc(r.title)}</div>
      <div class="rc-list"><span class="list-dot" style="background:${l.color}"></span>${esc(l.name)}</div>
      ${r.notes?`<div class="rc-note">${esc(r.notes)}</div>`:''}
    </div>
    <div id="spotZone">
      <div class="spot-actions">
        <button class="spot-btn spot-done" id="spDone"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12l5 5L20 7" stroke-linecap="round" stroke-linejoin="round"/></svg>Done</button>
        <button class="spot-btn spot-snooze" id="spSnooze">${IC.snooze}Reschedule</button>
        <button class="spot-btn spot-del" id="spDel">${IC.trash}Delete</button>
      </div>
    </div>
  </div>`;
  $('#spDone').onclick=()=>{ completeReminder(r.id); t.stats.done++; t.idx++; renderTriage(); };
  $('#spDel').onclick=()=>{ deleteReminder(r.id); t.stats.dismissed++; t.idx++; renderTriage(); };
  $('#spSnooze').onclick=()=>{
    $('#spotZone').innerHTML=`<div class="resched-pop">
      <button class="resched-opt" data-d="0">Today 9am</button>
      <button class="resched-opt" data-d="1">Tomorrow</button>
      <button class="resched-opt" data-d="3">In 3 days</button>
      <button class="resched-opt" data-d="7">Next week</button>
      <button class="resched-opt" data-d="14">In 2 weeks</button>
    </div>`;
    $$('#spotZone .resched-opt').forEach(o=>o.onclick=()=>{
      snoozeReminder(r.id, parseInt(o.dataset.d)); t.stats.rescheduled++; t.idx++; renderTriage();
    });
  };
}
function renderTriageDone(){
  const t=ui.triage, s=t.stats;
  $('#triageStageLabel').textContent='Complete';
  $('#triageBar').style.width='100%';
  const cleared=s.dismissed, done=s.done, resch=s.rescheduled;
  $('#triageBody').innerHTML=`<div class="stage-intro">
    <div class="all-clear"><div class="ac-circle">${IC.check}</div></div>
    <h2>Backlog cleared 🎉</h2>
    <p>You just swept through your overdue pile. Here's the damage:</p>
    <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:26px;">
      ${done?`<div class="stage-stat" style="background:var(--sage-soft);color:#4E7B54;"><b>${done}</b> done</div>`:''}
      ${resch?`<div class="stage-stat" style="background:var(--violet-soft);color:var(--violet-dark);"><b>${resch}</b> rescheduled</div>`:''}
      ${cleared?`<div class="stage-stat"><b>${cleared}</b> cleared</div>`:''}
    </div>
    <div class="triage-foot"><button class="btn btn-primary" id="triageFinish">Back to Nudge</button></div>
  </div>`;
  $('#triageFinish').onclick=endTriage;
}

/* ---------- overlay helpers ---------- */
function showOverlay(sel){ $(sel).classList.add('show'); document.body.style.overflow='hidden'; }
function hideOverlay(sel){ $(sel).classList.remove('show'); document.body.style.overflow=''; }

/* ---------- toast ---------- */
let toastTimer=null;
function showToast(msg, actionLabel, actionFn){
  const t=$('#toast');
  t.innerHTML = `<span>${esc(msg)}</span>` + (actionLabel?`<button class="toast-action">${esc(actionLabel)}</button>`:'');
  if(actionLabel){ t.querySelector('.toast-action').onclick=()=>{ actionFn&&actionFn(); hideToast(); }; }
  t.classList.add('show'); clearTimeout(toastTimer); toastTimer=setTimeout(hideToast, actionLabel?5000:2400);
}
function hideToast(){ $('#toast').classList.remove('show'); }

/* ---------- notifications (in-app check; push comes in Phase 2) ---------- */
function checkNudges(){
  if(!state.settings.notifs || !('Notification' in window) || Notification.permission!=='granted') return;
  const overdue=allOverdue();
  const esc3=overdue.filter(r=> -daysBetween(new Date(r.dueDate),new Date()) >=3 );
  const last = state.settings._lastNudge ? new Date(state.settings._lastNudge) : null;
  const now=new Date();
  if(esc3.length && (!last || daysBetween(now,last)>=1)){
    new Notification('Nudge', { body:`${esc3.length} reminder${esc3.length>1?'s are':' is'} 3+ days overdue. Time for a quick triage?`, tag:'nudge-escalate' });
    state.settings._lastNudge=now.toISOString(); persist();
  }
}

/* ============ EVENT BINDINGS ============ */
function bindGlobal(){
  $('#fab').onclick=openAdd;
  $('#qaSave').onclick=saveQA;
  $('#qaDelete').onclick=()=>{ if(ui.editingId){ deleteReminder(ui.editingId); hideOverlay('#addOverlay'); render(); showToast('Deleted'); } };
  $('#qaTitle').oninput=()=>{
    const v=$('#qaTitle').value;
    $('#qaSave').disabled = !v.trim();
    if(ui.editingId) return;
    const p=parseNaturalDate(v);
    if(p){
      if(!ui.qa.dateManual){ if(p.date) ui.qa.date=p.date; if(p.time) ui.qa.time=p.time; }
      ui.qa.nlSource=v.trim(); ui.qa.nlClean=p.title; syncQAChips();
    } else { ui.qa.nlSource=null; ui.qa.nlClean=null; }
  };
  $('#qaTitle').onkeydown=(e)=>{ if(e.key==='Enter'){ e.preventDefault(); if($('#qaTitle').value.trim()) saveQA(); } };

  $('#qaMoreToggle').onclick=()=>{ $('#qaDetail').classList.toggle('show'); $('#qaMoreToggle').classList.toggle('open'); };
  $('#qaSubAdd').onclick=addQASub;
  $('#qaSubInput').onkeydown=(e)=>{ if(e.key==='Enter'){ e.preventDefault(); addQASub(); } };

  // chips
  $('#chipDate').onclick=()=>{ $('#qaDetail').classList.add('show'); $('#qaMoreToggle').classList.add('open'); $('#qaDate').showPicker?.(); $('#qaDate').focus(); };
  $('#chipList').onclick=()=>{ $('#qaDetail').classList.add('show'); $('#qaMoreToggle').classList.add('open'); $('#qaListPills').scrollIntoView({block:'nearest'}); };
  $('#chipPri').onclick=()=>{ const order=['normal','high','low']; const i=order.indexOf(ui.qa.pri); ui.qa.pri=order[(i+1)%3]; setSeg('#qaPriSeg','pri',ui.qa.pri); syncQAChips(); };

  $('#qaDate').onchange=()=>{ ui.qa.date=$('#qaDate').value||null; ui.qa.dateManual=true; syncQAChips(); };
  $('#qaTime').onchange=()=>{ ui.qa.time=$('#qaTime').value||null; ui.qa.dateManual=true; syncQAChips(); };
  $$('#qaRepeat button').forEach(b=>b.onclick=()=>{ ui.qa.repeat=b.dataset.rep; setSeg('#qaRepeat','rep',ui.qa.repeat); });
  $$('#qaPriSeg button').forEach(b=>b.onclick=()=>{ ui.qa.pri=b.dataset.pri; setSeg('#qaPriSeg','pri',ui.qa.pri); syncQAChips(); });

  // list sheet
  $('#addListBtn').onclick=()=>openNewList();
  $('#newListName').oninput=()=>{ $('#saveListBtn').disabled=!$('#newListName').value.trim(); };
  $('#newListName').onkeydown=(e)=>{ if(e.key==='Enter'&&$('#newListName').value.trim()) saveList(); };
  $('#saveListBtn').onclick=saveList;
  $('#deleteListBtn').onclick=deleteList;

  // smart lists
  $('#addSmartBtn').onclick=()=>openSmartBuilder();
  $('#smartEditBtn').onclick=()=>{ if(ui.smartId) openSmartBuilder(ui.smartId); };
  $('#smartName').oninput=()=>{ $('#saveSmartBtn').disabled=!$('#smartName').value.trim(); };
  $('#saveSmartBtn').onclick=saveSmart;
  $('#deleteSmartBtn').onclick=deleteSmart;
  $('#smartSheet').querySelector('.sheet-handle').onclick=()=>hideOverlay('#smartOverlay');
  ['smartPri','smartOverdue','smartNoDate'].forEach(id=>{ $('#'+id).onclick=()=>$('#'+id).classList.toggle('on'); });

  // overlays: click outside / handle to close
  $$('.overlay').forEach(o=>o.onclick=(e)=>{ if(e.target===o) hideOverlay('#'+o.id); });
  $('#addSheet').querySelector('.sheet-handle').onclick=()=>hideOverlay('#addOverlay');
  $('#listSheet').querySelector('.sheet-handle').onclick=()=>hideOverlay('#listOverlay');

  // triage
  $('#triageClose').onclick=()=>{ if(confirm('Exit triage? Your progress so far is saved.')) endTriage(); };

  // nav
  $$('#sidebar .nav-item[data-view]').forEach(b=>{ if(!b.dataset.list||b.dataset.list==='all'){ b.onclick=()=>navTo(b.dataset.view, b.dataset.list==='all'?'all':undefined); } });
  $$('#bottomnav .bn-item').forEach(b=>b.onclick=()=>navTo(b.dataset.view, b.dataset.list||undefined));

  // search
  $('#boardToggle').onclick=()=>{ ui.board=!ui.board; state.settings.boardView=ui.board; persist(); render(); };
  $('#searchToggle').onclick=()=>{ const hidden=$('#searchWrap').classList.contains('hidden'); setSearchVisible(hidden); };
  $('#searchInput').oninput=()=>{ ui.search=$('#searchInput').value.trim(); $('#searchClear').style.display=ui.search?'flex':'none'; render(); };
  $('#searchClear').onclick=()=>{ ui.search=''; $('#searchInput').value=''; $('#searchClear').style.display='none'; $('#searchInput').focus(); render(); };

  // keyboard
  document.addEventListener('keydown',(e)=>{
    if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'){
      if(e.key==='Escape') e.target.blur();
      return;
    }
    if(e.key==='n'||e.key==='N'){ e.preventDefault(); openAdd(); }
    else if(e.key==='/'){ e.preventDefault(); setSearchVisible(true); }
    else if(e.key==='Escape'){ $$('.overlay.show').forEach(o=>hideOverlay('#'+o.id)); if(ui.triage.active && !$('.overlay.show')) {} }
    else if(e.key==='t'||e.key==='T'){ if(allOverdue().length) startTriage(); }
    else if(e.key==='b'||e.key==='B'){ if(['all','today','scheduled'].includes(ui.view)){ ui.board=!ui.board; state.settings.boardView=ui.board; persist(); render(); } }
  });
}

/* ---------- seed sample data on first run ---------- */
function seedSample(){
  const now=new Date();
  const mk=(t,dayOffset,opts={})=>{ const d=new Date(now); d.setDate(d.getDate()+dayOffset); d.setHours(opts.h??9,opts.m??0,0,0); return {title:t,dueDate:d.toISOString(),hasTime:opts.hasTime??true, listId:opts.list||'reminders', priority:opts.pri||'normal', repeat:opts.repeat||'none'}; };
  [
    mk('Find different running shoes',-22,{list:'personal'}),
    mk('Update iPhone Home Screen widgets',-22,{list:'personal'}),
    mk('Pay TFL outstanding payment',-1,{list:'finance',pri:'high'}),
    mk('Buy Alby birthday gift',-1,{list:'shopping',pri:'high'}),
    mk('Claude — discuss work schedule',-18,{list:'claude'}),
    mk('Epiduo night',0,{repeat:'daily',list:'personal',h:21}),
    mk('Renew Japanese passport',16,{list:'personal',pri:'high'}),
    mk('Buy microfibre towel',15,{list:'shopping'}),
    mk('Strip bed & mattress sheets',9,{list:'personal'}),
    {title:'Study Japanese — 30 min', dueDate:null, listId:'study', priority:'normal', repeat:'none'},
  ].forEach(addReminder);
  state.settings.firstRun=false; persist();
}

/* ============ INTEGRATIONS — auto-reminders from StudyTrack & Finance ============ */
/* StudyTrack auto-reminders removed — app unlinked from Nudge 2026-06-11. */
async function financeAuto(){
  if(!FINANCE.anon) return [];
  const res=await fetch(`${FINANCE.url}/rest/v1/finance_data?user_key=eq.${FINANCE.userKey}&select=data`,{headers:{apikey:FINANCE.anon,Authorization:`Bearer ${FINANCE.anon}`}});
  if(!res.ok) throw new Error('fin '+res.status);
  const rows=await res.json(); const d=rows&&rows[0]?rows[0].data:null;
  if(!d||!d.settings) return [];
  const out=[]; const ym=new Date().toISOString().slice(0,7); const due=new Date(); due.setHours(20,0,0,0);
  const goals=(d.settings.goals||[]).filter(g=>(g.target||0)>0);
  if(goals.length){
    let saved=0,target=0; goals.forEach(g=>{saved+=(g.saved||0);target+=(g.target||0);});
    const pct=target?Math.round(saved/target*100):0;
    const lines=goals.map(g=>`${g.name}: ¥${Math.round(g.saved||0).toLocaleString()} / ¥${Math.round(g.target||0).toLocaleString()}`).join('\n');
    out.push({ id:`auto-fin-goals-${ym}`, source:'finance', listId:'finance', dueDate:due.toISOString(), hasTime:true,
      title:`💰 Savings check-in — ${pct}% to your goals`, notes:lines });
  }
  // new one-off expenses this month → a "budget for it" reminder (no date, gentle)
  const md=(d.data&&d.data[ym])?d.data[ym]:{};
  (md.oneOffs||[]).forEach(o=>{
    if(o.mumPays || !o.name) return;
    out.push({ id:`auto-fin-oneoff-${o.id}`, source:'finance', listId:'finance', dueDate:null, hasTime:false,
      title:`💰 Budget for ${o.name}`+(o.amount?` (¥${Math.round(o.amount).toLocaleString()})`:''), notes:'One-off expense added in your finance app' });
  });
  return out;
}
async function syncIntegrations(){
  let adds=[];
  try{ adds=adds.concat(await financeAuto()); }catch(e){ console.warn('finance sync failed', e); }
  if(!adds.length) return;
  const ids=new Set(state.reminders.map(r=>r.id));
  let changed=false;
  adds.forEach(a=>{
    if(ids.has(a.id)) return;  // already created this period — respect any user changes
    state.reminders.unshift({
      id:a.id, title:a.title, notes:a.notes||'', dueDate:a.dueDate||null, hasTime:a.hasTime??false,
      listId:a.listId||'reminders', priority:a.priority||'normal', completed:false, completedAt:null,
      recurrence:null, subtasks:[], remindBefore:null, tz:null,
      createdAt:new Date().toISOString(), source:a.source||'auto', snoozedUntil:null, dismissed:false
    });
    changed=true;
  });
  if(changed){ persist(); render(); }
}

/* ---------- init ---------- */
async function init(){
  loadLocal();
  if(CLOUD){ await cloudPull(); }
  else setSync('local');
  if(state.settings.firstRun && state.reminders.length===0) seedSample();
  const _dd=dedupeReminders();   // self-heal any duplicate pile-ups (e.g. repeated Apple imports)
  if(_dd>0){ console.info('Nudge: collapsed '+_dd+' duplicate reminder(s)'); persist(); }
  const _pc=purgeOldCompleted(); // clear reminders completed >3 weeks ago
  if(_pc>0){ console.info('Nudge: cleared '+_pc+' old completed reminder(s)'); persist(); }
  ui.board = !!state.settings.boardView;
  bindGlobal();
  render();
  syncIntegrations();   // pull StudyTrack (+ Finance) data → generate [Auto] reminders
  if('Notification' in window && state.settings.notifs && Notification.permission==='granted') setTimeout(checkNudges, 1500);
  // register SW
  if('serviceWorker' in navigator){ navigator.serviceWorker.register('sw.js').catch(()=>{}); }
}
init();
